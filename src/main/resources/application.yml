spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:mail_system}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&zeroDateTimeBehavior=CONVERT_TO_NULL
    username: ${DB_USER:root}
    password: ${DB_PASS:changeme}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:changeme}
      timeout: 3000ms
  mail:
    host: smtp.qq.com
    port: 465
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MYBATIS_LOG_IMPL:}

jwt:
  secret: ${JWT_SECRET:dev-only-placeholder-key-must-be-at-least-32-chars!}
  expire-ms: 86400000

app:
  upload-dir: ${UPLOAD_DIR:./uploads}
  mail-domain: ${APP_MAIL_DOMAIN:lneqse.com}
  encryption-key: ${APP_ENCRYPTION_KEY:dev-only-placeholder-key-32chars!!}
  remote-api-secret: ${REMOTE_API_SECRET:CHANGE_ME}
  glm:
    api-key: ${GLM_API_KEY:}
    model: ${GLM_MODEL:glm-5}
  imap:
    host: ${IMAP_HOST:imap.qq.com}
    port: ${IMAP_PORT:993}
    username: ${IMAP_USER:}
    password: ${IMAP_PASS:}

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
