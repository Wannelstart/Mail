version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mail_mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - mail_net

  redis:
    image: redis:7-alpine
    container_name: mail_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mail_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mail_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ${REDIS_PASS:-}
      UPLOAD_BASE_DIR: /data/uploads
      APP_PUBLIC_SCHEME: ${APP_PUBLIC_SCHEME}
      APP_PUBLIC_HOST: ${APP_PUBLIC_HOST}
      APP_PUBLIC_PORT: ${APP_PUBLIC_PORT}
      APP_CONTEXT_PATH: ${APP_CONTEXT_PATH}
      REMOTE_API_SECRET: ${REMOTE_API_SECRET}
    volumes:
      - app_uploads:/data/uploads
    networks:
      - mail_net

  nginx:
    image: nginx:1.27-alpine
    container_name: mail_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certbot/www:/var/www/certbot
      - ./deploy/nginx/certbot/conf:/etc/letsencrypt
    networks:
      - mail_net

volumes:
  mysql_data:
  redis_data:
  app_uploads:

networks:
  mail_net:
    driver: bridge
